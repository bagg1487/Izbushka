<!DOCTYPE html>
<html>
<head>
    <title>Казино Избушка • Древнерусский стиль</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rubik+Wet+Paint&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #2b1b0e;
            height: 100vh;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            position: relative;
        }
        
        /* Текстура дерева на фоне */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(90deg, rgba(139, 69, 19, 0.3) 0px, rgba(139, 69, 19, 0.3) 2px, transparent 2px, transparent 4px),
                repeating-linear-gradient(0deg, rgba(101, 67, 33, 0.3) 0px, rgba(101, 67, 33, 0.3) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
        }
        
        .casino-container {
            display: flex;
            height: 100vh;
            background: linear-gradient(135deg, #8B4513 0%, #654321 50%, #8B4513 100%);
            position: relative;
            border: 20px solid #DAA520;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 0 0 10px #CD7F32;
        }
        
        /* Узоры по краям */
        .casino-container::before {
            content: '☦ ☦ ☦';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #FFD700;
            font-size: 24px;
            letter-spacing: 20px;
            text-shadow: 3px 3px 0 #8B4513;
            z-index: 5;
        }
        
        .casino-container::after {
            content: '✧ ✧ ✧';
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #FFD700;
            font-size: 24px;
            letter-spacing: 20px;
            text-shadow: 3px 3px 0 #8B4513;
            z-index: 5;
        }
        
        .slots-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: rgba(44, 22, 8, 0.7);
            margin: 40px;
            border: 5px solid #DAA520;
            border-radius: 50px 50px 20px 20px;
            box-shadow: inset 0 0 50px #2b1b0e, 0 20px 30px rgba(0,0,0,0.8);
        }
        
        .reels-container {
            display: flex;
            gap: 30px; /* Увеличил промежуток между барабанами */
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #5c3b1c, #3b2a15);
            padding: 50px 80px; /* Увеличил паддинги по бокам */
            border-radius: 80px 80px 40px 40px;
            border: 15px solid #DAA520;
            box-shadow: 
                inset 0 0 50px rgba(0,0,0,0.8),
                0 20px 30px rgba(0,0,0,0.7),
                0 0 0 5px #CD7F32;
            position: relative;
            min-width: 1200px; /* Минимальная ширина контейнера */
        }
        
        /* Древнерусские орнаменты по бокам */
        .reels-container::before {
            content: '⚜️';
            position: absolute;
            left: -50px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 80px; /* Увеличил */
            color: #FFD700;
            filter: drop-shadow(5px 5px 0 #8B4513);
        }
        
        .reels-container::after {
            content: '⚜️';
            position: absolute;
            right: -50px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 80px; /* Увеличил */
            color: #FFD700;
            filter: drop-shadow(5px 5px 0 #8B4513);
        }
        
        .reel {
            width: 280px; /* БЫЛО 200px - СДЕЛАЛ ШИРЕ */
            height: 700px; /* БЫЛО 600px - УВЕЛИЧИЛ */
            background: #F4E9D8;
            border: 12px solid #8B4513; /* Утолщил рамку */
            border-radius: 40px; /* Увеличил скругление */
            position: relative;
            overflow: hidden;
            box-shadow: 
                inset 0 0 50px rgba(101, 67, 33, 0.5),
                15px 15px 30px rgba(0,0,0,0.6);
        }
        
        /* Резные узоры на барабанах */
        .reel::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 3px solid #DAA520; /* Утолщил */
            border-radius: 25px;
            pointer-events: none;
            z-index: 2;
        }
        
        .reel::after {
            content: '✦';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #DAA520;
            font-size: 32px; /* Увеличил */
            z-index: 2;
            text-shadow: 3px 3px 0 #8B4513;
        }
        
        .reel-inner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transition: top 3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        
        .reel-image {
            width: 100%;
            height: 700px; /* Под новый размер барабана */
            object-fit: cover;
            background: #F4E9D8;
            border-bottom: 3px solid #8B4513;
            display: block;
            filter: sepia(0.3) contrast(1.1);
        }
        
        .reel.spinning .reel-inner {
            transition: top 0.1s linear;
        }
        
        .win-animation .reel {
            animation: ancientWinPulse 0.3s infinite alternate;
        }
        
        @keyframes ancientWinPulse {
            0% { 
                box-shadow: 0 0 50px #FFD700;
                border-color: #FFD700;
            }
            100% { 
                box-shadow: 0 0 100px #FFA500;
                border-color: #FFA500;
            }
        }
        
        .lever-section {
            width: 250px; /* Увеличил */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .lever-container {
            position: relative;
            width: 120px; /* Увеличил */
            height: 600px; /* Увеличил */
        }
        
        .lever-base {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px; /* Увеличил */
            height: 350px; /* Увеличил */
            background: linear-gradient(45deg, #8B4513, #A0522D, #5c3b1c);
            border: 10px solid #DAA520; /* Утолщил */
            border-radius: 50px 50px 30px 30px; /* Увеличил */
            box-shadow: 
                inset 0 0 50px rgba(0,0,0,0.7),
                15px 15px 30px rgba(0,0,0,0.7);
            position: relative;
        }
        
        /* Резьба на основании */
        .lever-base::before {
            content: '☦';
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #DAA520;
            font-size: 50px; /* Увеличил */
            text-shadow: 3px 3px 0 #3b2a15;
        }
        
        .lever-handle {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) rotate(0deg);
            width: 60px; /* Увеличил */
            height: 350px; /* Увеличил */
            background: linear-gradient(135deg, #CD7F32, #DAA520, #B8860B);
            border: 6px solid #8B4513; /* Утолщил */
            border-radius: 40px; /* Увеличил */
            cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-origin: top center;
            z-index: 2;
            box-shadow: 
                15px 15px 30px rgba(0,0,0,0.6),
                inset -5px -5px 15px rgba(0,0,0,0.3);
        }
        
        .lever-handle.pulled {
            transform: translateX(-50%) rotate(60deg);
        }
        
        .lever-handle::before {
            content: '⚜️';
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px; /* Увеличил */
            color: #FFD700;
            filter: drop-shadow(3px 3px 0 #8B4513);
        }
        
        .lever-handle::after {
            content: '';
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px; /* Увеличил */
            height: 50px; /* Увеличил */
            background: radial-gradient(circle, #FFD700, #B8860B);
            border-radius: 50%;
            border: 4px solid #8B4513;
            box-shadow: 0 0 30px #FFD700;
        }
        
        .result-display {
            position: absolute;
            top: 120px; /* Опустил ниже */
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px; /* Увеличил */
            font-weight: bold;
            text-align: center;
            font-family: 'Rubik Wet Paint', cursive;
            color: #FFD700;
            text-shadow: 
                5px 5px 0 #8B4513,
                8px 8px 0 #2b1b0e,
                0 0 30px #FFD700;
            z-index: 20;
            padding: 25px 50px; /* Увеличил */
            border-radius: 80px 80px 40px 40px;
            background: linear-gradient(135deg, #5c3b1c, #3b2a15);
            border: 6px solid #DAA520;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            letter-spacing: 6px;
            white-space: nowrap;
        }
        
        .win {
            color: #00ff00;
            animation: ancientWinText 0.5s infinite alternate;
            background: linear-gradient(135deg, #2d5c2d, #1e3b1e);
            border-color: #00ff00;
            box-shadow: 0 0 80px #00ff00;
        }
        
        .lose {
            color: #ff4444;
            animation: ancientLoseText 0.5s infinite alternate;
            background: linear-gradient(135deg, #5c2d2d, #3b1e1e);
            border-color: #ff4444;
        }
        
        @keyframes ancientWinText {
            0% { transform: translateX(-50%) scale(1); filter: brightness(1); }
            100% { transform: translateX(-50%) scale(1.2); filter: brightness(1.5); }
        }
        
        @keyframes ancientLoseText {
            0% { opacity: 1; filter: blur(0px); }
            100% { opacity: 0.7; filter: blur(2px); }
        }
        
        .sparkle {
            position: absolute;
            width: 40px; /* Увеличил */
            height: 40px; /* Увеличил */
            background: radial-gradient(circle, #FFD700, #FFA500);
            border-radius: 50%;
            pointer-events: none;
            animation: ancientSparkleFly 2s ease-out forwards;
            box-shadow: 0 0 40px gold;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
        
        @keyframes ancientSparkleFly {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: scale(2) rotate(720deg) translateY(-400px);
                opacity: 0;
            }
        }

        .machine-decoration {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 70px; /* Увеличил */
            color: #FFD700;
            text-shadow: 
                8px 8px 0 #8B4513,
                12px 12px 0 #2b1b0e;
            z-index: 10;
            font-family: 'Rubik Wet Paint', cursive;
            white-space: nowrap;
            background: linear-gradient(135deg, #5c3b1c, #3b2a15);
            padding: 25px 100px; /* Увеличил */
            border-radius: 120px;
            border: 10px solid #DAA520; /* Утолщил */
            box-shadow: 0 25px 40px rgba(0,0,0,0.8);
            letter-spacing: 10px;
        }
        
        /* Добавляем древнерусские узоры по углам */
        .corner-decoration {
            position: absolute;
            width: 150px; /* Увеличил */
            height: 150px; /* Увеличил */
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="%23DAA520"><path d="M50 0 L60 40 L100 40 L70 60 L80 100 L50 75 L20 100 L30 60 L0 40 L40 40 Z"/></svg>');
            opacity: 0.5;
            z-index: 1;
        }
        
        .corner-tl {
            top: 20px;
            left: 20px;
            transform: rotate(0deg);
        }
        
        .corner-tr {
            top: 20px;
            right: 20px;
            transform: rotate(90deg);
        }
        
        .corner-bl {
            bottom: 20px;
            left: 20px;
            transform: rotate(-90deg);
        }
        
        .corner-br {
            bottom: 20px;
            right: 20px;
            transform: rotate(180deg);
        }
        
        /* Адаптивность для больших экранов */
        @media (min-width: 1920px) {
            .reel {
                width: 350px;
                height: 850px;
            }
            .reel-image {
                height: 850px;
            }
            .reels-container {
                gap: 50px;
                padding: 60px 100px;
            }
            .machine-decoration {
                font-size: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="corner-decoration corner-tl"></div>
    <div class="corner-decoration corner-tr"></div>
    <div class="corner-decoration corner-bl"></div>
    <div class="corner-decoration corner-br"></div>
    
    <div class="casino-container">
        <div class="machine-decoration">☦ ИЗБУШКА КАЗИНО ☦</div>
        
        <div class="slots-section">
            <div class="reels-container">
                <div class="reel" id="reel1">
                    <div class="reel-inner">
                        <img src="1.png" class="reel-image" alt="7">
                        <img src="2.png" class="reel-image" alt="BAR">
                        <img src="3.png" class="reel-image" alt="Cherry">
                        <img src="4.png" class="reel-image" alt="Grape">
                        <img src="5.png" class="reel-image" alt="Bell">
                        <img src="6.png" class="reel-image" alt="Diamond">
                        <img src="7.png" class="reel-image" alt="Horseshoe">
                    </div>
                </div>
                <div class="reel" id="reel2">
                    <div class="reel-inner">
                        <img src="1.png" class="reel-image" alt="7">
                        <img src="2.png" class="reel-image" alt="BAR">
                        <img src="3.png" class="reel-image" alt="Cherry">
                        <img src="4.png" class="reel-image" alt="Grape">
                        <img src="5.png" class="reel-image" alt="Bell">
                        <img src="6.png" class="reel-image" alt="Diamond">
                        <img src="7.png" class="reel-image" alt="Horseshoe">
                    </div>
                </div>
                <div class="reel" id="reel3">
                    <div class="reel-inner">
                        <img src="1.png" class="reel-image" alt="7">
                        <img src="2.png" class="reel-image" alt="BAR">
                        <img src="3.png" class="reel-image" alt="Cherry">
                        <img src="4.png" class="reel-image" alt="Grape">
                        <img src="5.png" class="reel-image" alt="Bell">
                        <img src="6.png" class="reel-image" alt="Diamond">
                        <img src="7.png" class="reel-image" alt="Horseshoe">
                    </div>
                </div>
            </div>
            
            <div class="result-display" id="result"></div>
        </div>
        
        <div class="lever-section">
            <div class="lever-container">
                <div class="lever-base"></div>
                <div class="lever-handle" id="leverHandle"></div>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket('ws://localhost:8000/ws');
        let isSpinning = false;
        const reels = ['reel1', 'reel2', 'reel3'];
        const symbolCount = 7;
        const reelHeight = 700; // Под новый размер

        // Инициализация позиций барабанов
        reels.forEach(reelId => {
            const reel = document.getElementById(reelId);
            const reelInner = reel.querySelector('.reel-inner');
            const randomPosition = -Math.floor(Math.random() * symbolCount) * reelHeight;
            reelInner.style.top = randomPosition + 'px';
        });

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.type === 'casino_spin') {
                if (!isSpinning) {
                    spinSlots();
                }
            }
        };

        function spinSlots() {
            if (isSpinning) return;
            
            isSpinning = true;
            const leverHandle = document.getElementById('leverHandle');
            const resultElement = document.getElementById('result');
            
            // Анимация рычага
            leverHandle.classList.add('pulled');
            resultElement.textContent = '';
            resultElement.className = 'result-display';
            
            // Запуск вращения барабанов
            reels.forEach((reelId, index) => {
                const reel = document.getElementById(reelId);
                const reelInner = reel.querySelector('.reel-inner');
                
                reel.classList.add('spinning');
                
                // Быстрое вращение
                let spinCount = 0;
                const fastSpin = setInterval(() => {
                    const currentTop = parseInt(reelInner.style.top) || 0;
                    reelInner.style.top = (currentTop - reelHeight) + 'px';
                    spinCount++;
                    
                    if (spinCount > 25) {
                        clearInterval(fastSpin);
                        
                        // Медленное вращение к финальной позиции
                        const finalPosition = -Math.floor(Math.random() * symbolCount) * reelHeight;
                        reelInner.style.transition = 'top 2.5s cubic-bezier(0.1, 0.8, 0.2, 1)';
                        reelInner.style.top = finalPosition + 'px';
                        
                        setTimeout(() => {
                            reel.classList.remove('spinning');
                            reelInner.style.transition = '';
                            
                            if (index === reels.length - 1) {
                                setTimeout(() => finishSpin(), 500);
                            }
                        }, 2500);
                    }
                }, 40);
            });
        }

        function finishSpin() {
            const leverHandle = document.getElementById('leverHandle');
            const resultElement = document.getElementById('result');
            
            // Возврат рычага
            leverHandle.classList.remove('pulled');
            
            // Проверка выигрыша
            const reelValues = reels.map(reelId => {
                const reel = document.getElementById(reelId);
                const reelInner = reel.querySelector('.reel-inner');
                const position = Math.abs(parseInt(reelInner.style.top)) / reelHeight;
                return Math.floor(position % symbolCount);
            });
            
            // Все три одинаковые - выигрыш
            const isWin = reelValues[0] === reelValues[1] && reelValues[1] === reelValues[2];
            
            if (isWin) {
                resultElement.textContent = 'ДЖЕКПОТ!';
                resultElement.className = 'result-display win';
                
                // Анимация выигрыша
                document.querySelector('.reels-container').classList.add('win-animation');
                createSparkles();
                
                setTimeout(() => {
                    document.querySelector('.reels-container').classList.remove('win-animation');
                }, 3000);
            } else {
                resultElement.textContent = 'ПОПРОБУЙ ЕЩЁ';
                resultElement.className = 'result-display lose';
            }
            
            isSpinning = false;
        }

        function createSparkles() {
            const container = document.querySelector('.slots-section');
            for (let i = 0; i < 50; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + 'vw';
                sparkle.style.top = '100vh';
                sparkle.style.animationDelay = Math.random() * 1 + 's';
                container.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 2000);
            }
        }

        // Клик по рычагу
        document.getElementById('leverHandle').addEventListener('click', function() {
            if (!isSpinning) {
                spinSlots();
            }
        });
    </script>
</body>
</html>
