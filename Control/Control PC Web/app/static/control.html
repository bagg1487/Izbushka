<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление · Избушка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: #2e1b0e;
            font-family: 'Palatino', 'Georgia', serif;
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .control-panel {
            max-width: 900px;
            width: 100%;
            background: #efdebc;
            border-radius: 60px;
            padding: 30px;
            box-shadow: 0 20px 30px -5px #1f140a;
            border: 3px solid #6b4f32;
        }
        
        h1 {
            text-align: center;
            color: #2a1d0d;
            font-size: 2.5rem;
            text-shadow: 2px 2px 0 #b58649;
            margin-bottom: 30px;
        }
        
        .video-container {
            width: 100%;
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid #ab7a41;
        }
        
        #videoFeed {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .joystick {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .ctrl-btn {
            background: #7c623e;
            border: 4px ridge #ecca90;
            border-radius: 30px;
            padding: 25px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 8px 0 #4c351b;
            transition: 0.1s;
        }
        
        .ctrl-btn:active {
            transform: translateY(8px);
            box-shadow: none;
        }
        
        .ctrl-btn i {
            font-size: 3rem;
            color: #ffefc8;
        }
        
        .status {
            background: #8b693f;
            border-radius: 30px;
            padding: 15px;
            color: white;
            text-align: center;
            margin: 20px 0;
            font-size: 1.2rem;
        }
        
        .connected {
            color: #aaffaa;
        }
        
        .disconnected {
            color: #ffaaaa;
        }
        
        .wasd-hint {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #8b693f;
            border-radius: 30px;
            color: white;
            font-size: 1.5rem;
            letter-spacing: 10px;
            border: 2px solid #ecca90;
        }
        
        .wasd-hint i {
            margin: 0 10px;
            color: #ffefc8;
        }
        
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2a1d0d;
            text-decoration: none;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <h1>ПОВЕЛІВАНІЕ</h1>
        
        <div class="status" id="status">
            Статус: <span id="statusText" class="disconnected">Не подключен</span>
        </div>
        
        <div class="video-container">
            <img id="videoFeed" src="" alt="Video Stream">
        </div>
        
        <div class="wasd-hint">
            <i class="fas fa-arrow-up"></i> W 
            <i class="fas fa-arrow-left"></i> A 
            <i class="fas fa-arrow-down"></i> S 
            <i class="fas fa-arrow-right"></i> D
        </div>
        
        <div class="joystick">
            <div></div>
            <div class="ctrl-btn" onclick="move('forward')" id="btn-forward"><i class="fas fa-arrow-up"></i><br><small>W</small></div>
            <div></div>
            <div class="ctrl-btn" onclick="move('left')" id="btn-left"><i class="fas fa-arrow-left"></i><br><small>A</small></div>
            <div class="ctrl-btn" onclick="move('stop')" id="btn-stop"><i class="fas fa-stop"></i><br><small>Space</small></div>
            <div class="ctrl-btn" onclick="move('right')" id="btn-right"><i class="fas fa-arrow-right"></i><br><small>D</small></div>
            <div></div>
            <div class="ctrl-btn" onclick="move('backward')" id="btn-backward"><i class="fas fa-arrow-down"></i><br><small>S</small></div>
            <div></div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
            <div class="ctrl-btn" onclick="handsUp()"><i class="fas fa-hand-paper"></i> Руки</div>
            <div class="ctrl-btn" onclick="musicPlay()"><i class="fas fa-music"></i> Музыка</div>
        </div>
        
        <a href="/" class="back-btn">← Вернуться в избушку</a>
    </div>
    
    <script>
        // WebSocket для видео
        const ws = new WebSocket(`ws://${location.host}/ws/video`);
        const videoFeed = document.getElementById('videoFeed');
        const statusDiv = document.getElementById('statusText');
        
        ws.onopen = () => {
            console.log('Video WebSocket connected');
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'video') {
                videoFeed.src = 'data:image/jpeg;base64,' + data.data;
            }
        };
        
        ws.onerror = (e) => {
            console.error('Video WebSocket error:', e);
        };
        
        // Статус подключения
        async function checkStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                if (data.connected) {
                    statusDiv.textContent = `Подключен к ${data.ip}`;
                    statusDiv.className = 'connected';
                } else {
                    statusDiv.textContent = 'Не подключен';
                    statusDiv.className = 'disconnected';
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        // Движение
        async function move(dir) {
            try {
                await fetch(`/commands/move/${dir}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({speed: 50})
                });
            } catch (e) {
                console.error(e);
            }
        }
        
        async function handsUp() {
            try {
                await fetch('/commands/hands', {method: 'POST'});
            } catch (e) {
                console.error(e);
            }
        }
        
        async function musicPlay() {
            try {
                await fetch('/commands/music/play', {method: 'POST'});
            } catch (e) {
                console.error(e);
            }
        }
        
        // Управление с клавиатуры
        let activeKeys = new Set();
        
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            e.preventDefault();
            
            if (activeKeys.has(key)) return;
            activeKeys.add(key);
            
            switch(key) {
                case 'w':
                    move('forward');
                    document.getElementById('btn-forward').style.transform = 'translateY(8px)';
                    break;
                case 'a':
                    move('left');
                    document.getElementById('btn-left').style.transform = 'translateY(8px)';
                    break;
                case 's':
                    move('backward');
                    document.getElementById('btn-backward').style.transform = 'translateY(8px)';
                    break;
                case 'd':
                    move('right');
                    document.getElementById('btn-right').style.transform = 'translateY(8px)';
                    break;
                case ' ':
                case 'space':
                    move('stop');
                    document.getElementById('btn-stop').style.transform = 'translateY(8px)';
                    break;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            activeKeys.delete(key);
            
            if (['w', 'a', 's', 'd'].includes(key)) {
                move('stop');
            }
            
            // Сброс визуального эффекта
            document.getElementById('btn-forward').style.transform = '';
            document.getElementById('btn-left').style.transform = '';
            document.getElementById('btn-backward').style.transform = '';
            document.getElementById('btn-right').style.transform = '';
            document.getElementById('btn-stop').style.transform = '';
        });
        
        // Запуск
        checkStatus();
        setInterval(checkStatus, 2000);

        let touchstartX = 0;
        let touchendX = 0;

        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (touchendX > touchstartX + 50) {  
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
