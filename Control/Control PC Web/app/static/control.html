<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление · Избушка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: #2e1b0e;
            font-family: 'Palatino', 'Georgia', serif;
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .control-panel {
            max-width: 600px;
            width: 100%;
            background: #efdebc;
            border-radius: 60px;
            padding: 30px;
            box-shadow: 0 20px 30px -5px #1f140a;
            border: 3px solid #6b4f32;
        }
        
        h1 {
            text-align: center;
            color: #2a1d0d;
            font-size: 2.5rem;
            text-shadow: 2px 2px 0 #b58649;
            margin-bottom: 30px;
        }
        
        .joystick {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        
        .ctrl-btn {
            background: #7c623e;
            border: 4px ridge #ecca90;
            border-radius: 30px;
            padding: 25px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 8px 0 #4c351b;
            transition: 0.1s;
        }
        
        .ctrl-btn:active {
            transform: translateY(8px);
            box-shadow: none;
        }
        
        .ctrl-btn i {
            font-size: 3rem;
            color: #ffefc8;
        }
        
        .status {
            background: #8b693f;
            border-radius: 30px;
            padding: 15px;
            color: white;
            text-align: center;
            margin: 20px 0;
            font-size: 1.2rem;
        }
        
        .connected {
            color: #aaffaa;
        }
        
        .disconnected {
            color: #ffaaaa;
        }
        
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2a1d0d;
            text-decoration: none;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <h1>ПОВЕЛІВАНІЕ</h1>
        
        <div class="status" id="status">
            Статус: <span id="statusText" class="disconnected">Не подключен</span>
        </div>
        
        <div class="joystick">
            <div></div>
            <div class="ctrl-btn" onclick="move('forward')"><i class="fas fa-arrow-up"></i></div>
            <div></div>
            <div class="ctrl-btn" onclick="move('left')"><i class="fas fa-arrow-left"></i></div>
            <div class="ctrl-btn" onclick="move('stop')"><i class="fas fa-stop"></i></div>
            <div class="ctrl-btn" onclick="move('right')"><i class="fas fa-arrow-right"></i></div>
            <div></div>
            <div class="ctrl-btn" onclick="move('backward')"><i class="fas fa-arrow-down"></i></div>
            <div></div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
            <div class="ctrl-btn" onclick="handsUp()"><i class="fas fa-hand-paper"></i> Руки</div>
            <div class="ctrl-btn" onclick="toggleVideo()"><i class="fas fa-video"></i> Видео</div>
            <div class="ctrl-btn" onclick="musicPlay()"><i class="fas fa-music"></i> Музыка</div>
            <div class="ctrl-btn" onclick="musicStop()"><i class="fas fa-stop-circle"></i> Стоп</div>
        </div>
        
        <a href="/" class="back-btn">← Вернуться в избушку</a>
    </div>
    
    <script>
        async function checkStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                const statusSpan = document.getElementById('statusText');
                if (data.connected) {
                    statusSpan.textContent = `Подключен к ${data.ip}`;
                    statusSpan.className = 'connected';
                } else {
                    statusSpan.textContent = 'Не подключен';
                    statusSpan.className = 'disconnected';
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        async function move(dir) {
            try {
                await fetch(`/commands/move/${dir}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({speed: 50})
                });
            } catch (e) {
                alert('Робот не подключен');
            }
        }
        
        async function handsUp() {
            try {
                await fetch('/commands/hands', {method: 'POST'});
            } catch (e) {
                alert('Робот не подключен');
            }
        }
        
        async function musicPlay() {
            try {
                await fetch('/commands/music/play', {method: 'POST'});
            } catch (e) {
                alert('Робот не подключен');
            }
        }
        
        async function musicStop() {
            try {
                await fetch('/commands/music/stop', {method: 'POST'});
            } catch (e) {
                alert('Робот не подключен');
            }
        }
        
        async function toggleVideo() {
            try {
                await fetch('/commands/video/toggle?state=true', {method: 'POST'});
                window.open('/video', '_blank');
            } catch (e) {
                alert('Робот не подключен');
            }
        }
        
        checkStatus();
        setInterval(checkStatus, 2000);
    </script>
</body>
</html>
