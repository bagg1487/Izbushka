<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вести · Избушка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: #2e1b0e;
            font-family: 'Palatino', 'Georgia', serif;
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .info-panel {
            max-width: 800px;
            width: 100%;
            background: #efdebc;
            border-radius: 60px;
            padding: 30px;
            box-shadow: 0 20px 30px -5px #1f140a;
            border: 3px solid #6b4f32;
        }
        
        h1 {
            text-align: center;
            color: #2a1d0d;
            font-size: 2.5rem;
            text-shadow: 2px 2px 0 #b58649;
            margin-bottom: 30px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .info-btn {
            background: #7c623e;
            border: 4px ridge #ecca90;
            border-radius: 30px;
            padding: 20px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 8px 0 #4c351b;
            transition: 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .info-btn:active {
            transform: translateY(8px);
            box-shadow: none;
        }
        
        .info-btn i {
            font-size: 2rem;
            color: #ffefc8;
        }
        
        .status {
            background: #8b693f;
            border-radius: 30px;
            padding: 15px;
            color: white;
            text-align: center;
            margin: 20px 0;
            font-size: 1.2rem;
        }
        
        .connected {
            color: #aaffaa;
        }
        
        .disconnected {
            color: #ffaaaa;
        }
        
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #2a1d0d;
            text-decoration: none;
            font-size: 1.2rem;
        }
        
        .section-title {
            color: #2a1d0d;
            font-size: 1.5rem;
            margin: 20px 0 10px;
            border-bottom: 2px solid #ab7a41;
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>ВѢСТИ</h1>
        
        <div class="status" id="status">
            Статус: <span id="statusText" class="disconnected">Не подключен</span>
        </div>

        <div class="section-title">🤖 О СЕБЕ</div>
        <div class="info-grid">
            <div class="info-btn" onclick="sendCommand('about0')">
                <i class="fas fa-code"></i>
                <span>О коде</span>
            </div>
            <div class="info-btn" onclick="sendCommand('about1')">
                <i class="fas fa-microchip"></i>
                <span>О плате</span>
            </div>
            <div class="info-btn" onclick="sendCommand('about2')">
                <i class="fas fa-bolt"></i>
                <span>О питании</span>
            </div>
            <div class="info-btn" onclick="sendCommand('about3')">
                <i class="fas fa-brain"></i>
                <span>О нейросетях</span>
            </div>
            <div class="info-btn" onclick="sendCommand('about4')">
                <i class="fas fa-cog"></i>
                <span>О настройках</span>
            </div>
            <div class="info-btn" onclick="sendCommand('about5')">
                <i class="fas fa-info-circle"></i>
                <span>О системе</span>
            </div>
        </div>

        <div class="section-title">🎮 ДЕЙСТВИЯ</div>
        <div class="info-grid">
            <div class="info-btn" onclick="sendCommand('hands')">
                <i class="fas fa-hand-paper"></i>
                <span>Помахать</span>
            </div>
            <div class="info-btn" onclick="sendCommand('music_play')">
                <i class="fas fa-play"></i>
                <span>Музыка вкл</span>
            </div>
            <div class="info-btn" onclick="sendCommand('music_stop')">
                <i class="fas fa-stop"></i>
                <span>Музыка выкл</span>
            </div>
            <div class="info-btn" onclick="sendCommand('radio_play')">
                <i class="fas fa-broadcast-tower"></i>
                <span>Радио вкл</span>
            </div>
            <div class="info-btn" onclick="sendCommand('radio_stop')">
                <i class="fas fa-times-circle"></i>
                <span>Радио выкл</span>
            </div>
            <div class="info-btn" onclick="sendCommand('menu')">
                <i class="fas fa-bars"></i>
                <span>Меню</span>
            </div>
        </div>
        
        <a href="/" class="back-btn">← Вернуться в избушку</a>
    </div>
    
    <script>
        async function checkStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                const statusSpan = document.getElementById('statusText');
                if (data.connected) {
                    statusSpan.textContent = `Подключен к ${data.ip}`;
                    statusSpan.className = 'connected';
                } else {
                    statusSpan.textContent = 'Не подключен';
                    statusSpan.className = 'disconnected';
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        async function sendCommand(cmd) {
            try {
                let url = '';
                
                switch(cmd) {
                    case 'hands':
                        url = '/commands/hands';
                        break;
                    case 'music_play':
                        url = '/commands/music/play';
                        break;
                    case 'music_stop':
                        url = '/commands/music/stop';
                        break;
                    case 'radio_play':
                        url = '/commands/radio/play';
                        break;
                    case 'radio_stop':
                        url = '/commands/radio/stop';
                        break;
                    case 'menu':
                        url = '/commands/menu';
                        break;
                    case 'about0':
                    case 'about1':
                    case 'about2':
                    case 'about3':
                    case 'about4':
                    case 'about5':
                        const num = cmd.replace('about', '');
                        url = `/commands/about/${num}`;
                        break;
                }
                
                const res = await fetch(url, {method: 'POST'});
                const data = await res.json();
                if (data.status === 'ok') {
                    console.log(`Command ${cmd} sent`);
                }
            } catch (e) {
                console.error(e);
                alert('Робот не подключен');
            }
        }
        
        checkStatus();
        setInterval(checkStatus, 2000);

        let touchstartX = 0;
        let touchendX = 0;

        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (touchendX < touchstartX - 50) {  // Свайп влево
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
